apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bpa-website
  namespace: bpa-website
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  tls:
  - hosts:
    - blueprintautomation.tech
    - www.blueprintautomation.tech
    secretName: bpa-website-tls
  rules:
  - host: blueprintautomation.tech
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: bpa-website
            port:
              number: 80
  - host: www.blueprintautomation.tech
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: bpa-website
            port:
              number: 80
